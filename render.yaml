services:
  - type: web
    name: regguard-api
    runtime: python
    pythonVersion: 3.11
    plan: standard
    buildCommand: >
      cd backend &&
      bash install_resend.sh &&
      pip install -r requirements.txt &&
      echo "Build complete - all dependencies installed"
    startCommand: "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
