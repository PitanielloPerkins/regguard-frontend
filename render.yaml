services:
  - type: web
    name: regguard-api
    runtime: python
    pythonVersion: 3.11.10
    plan: standard
    
    buildCommand: >
      cd backend &&
      pip install --no-cache-dir --upgrade pip &&
      pip install --no-cache-dir --force-reinstall "resend>=0.8.0" &&
      pip install -r requirements.txt &&
      python -c "import resend; print('✅ Resend verified')"
    
    startCommand: >
      cd backend &&
      python -m uvicorn main:app --host 0.0.0.0 --port $PORT --workers 4
    
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: info
