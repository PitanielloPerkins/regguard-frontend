services:
  - type: web
    name: regguard-api
    runtime: python
    pythonVersion: 3.11
    plan: standard
    buildCommand: >
      cd backend &&
      pip install --upgrade pip &&
      pip install --no-cache-dir resend &&
      pip install --no-cache-dir -r requirements.txt &&
      python -c "import resend; import sys; print('✅ RESEND READY'); sys.exit(0)" || (echo "❌ RESEND FAILED"; exit 1)
    startCommand: "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
