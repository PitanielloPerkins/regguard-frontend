services:
  - type: web
    name: regguard-api
    runtime: python
    pythonVersion: 3.11
    plan: standard
    buildCommand: "cd backend && pip install --upgrade pip && pip install --no-cache-dir --force-reinstall resend && pip install -r requirements.txt"
    startCommand: "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
